<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Media UniGe">
<meta name="theme-color" content="#0f1117">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Media UniGe</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0f1117;
    --card:    #181c27;
    --border:  #252a38;
    --accent:  #4f8ef7;
    --accent2: #7c5cfa;
    --success: #34d399;
    --danger:  #f87171;
    --laud:    #fbbf24;
    --text:    #e2e8f0;
    --muted:   #64748b;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    -webkit-text-size-adjust: 100%;
    overscroll-behavior: none;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bot);
  }

  /* ── Top bar ── */
  #topbar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  #topbar h1 {
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(120deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #clear-btn {
    background: none;
    border: none;
    color: var(--danger);
    font-size: 0.78rem;
    font-weight: 500;
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Result strip ── */
  #result-strip {
    flex-shrink: 0;
    display: flex;
    align-items: stretch;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 12px 18px;
  }

  .stat-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .stat-block + .stat-block { border-left: 1px solid var(--border); }

  .stat-label {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
  }

  .stat-value {
    font-size: 1.55rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  .v-lode  { color: var(--laud); }
  .v-good  { color: var(--success); }
  .v-mid   { color: var(--accent); }
  .v-low   { color: var(--danger); }
  .v-muted { color: var(--muted); }

  .stat-sub {
    font-size: 0.6rem;
    color: var(--laud);
    height: 12px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .stat-sub.visible { opacity: 1; }

  /* ── List ── */
  #list {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 10px 14px 6px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* ── Exam card ── */
  .exam-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    animation: slideIn 0.18s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-top {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-top input[type="text"] {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text);
    font-family: inherit;
    padding: 0;
    min-width: 0;
  }

  .card-top input[type="text"]::placeholder { color: var(--muted); font-weight: 400; }

  .del-btn {
    flex-shrink: 0;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1rem;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 6px;
    -webkit-tap-highlight-color: transparent;
    line-height: 1;
  }

  .card-bottom {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }

  .field-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .field-group label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
  }

  .field-group input[type="number"] {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 4px;
    text-align: center;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    font-family: inherit;
    outline: none;
    -moz-appearance: textfield;
    -webkit-appearance: none;
    appearance: none;
  }

  .field-group input[type="number"]::-webkit-inner-spin-button,
  .field-group input[type="number"]::-webkit-outer-spin-button { display: none; }

  .field-group input[type="number"]:focus {
    border-color: var(--accent);
    background: rgba(79,142,247,0.08);
  }

  .lode-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .lode-group .fl { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }

  .lode-toggle {
    width: 44px;
    height: 38px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--muted);
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .lode-toggle.active {
    background: rgba(251,191,36,0.15);
    border-color: rgba(251,191,36,0.5);
    color: var(--laud);
  }

  .punti-pill {
    flex-shrink: 0;
    min-width: 52px;
    text-align: right;
    font-size: 0.8rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--muted);
    padding-bottom: 10px;
  }

  /* ── Empty state ── */
  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex: 1;
    color: var(--muted);
    font-size: 0.9rem;
    text-align: center;
    padding: 40px 20px;
  }

  #empty-state .emoji { font-size: 2.6rem; margin-bottom: 6px; }

  /* ── Bottom bar ── */
  #bottom-bar {
    flex-shrink: 0;
    padding: 8px 14px 12px;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }

  #conv-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 4px 8px;
    font-size: 0.78rem;
    color: var(--muted);
  }

  #conv-val {
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }

  #add-btn {
    width: 100%;
    padding: 15px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    letter-spacing: -0.01em;
    transition: opacity 0.15s;
  }

  #add-btn:active { opacity: 0.82; }

  /* ── Offline toast ── */
  #offline-toast {
    position: fixed;
    bottom: calc(90px + var(--safe-bot));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1e2435;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.78rem;
    padding: 8px 16px;
    border-radius: 20px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 100;
  }

  #offline-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>
<div id="app">

  <div id="topbar">
    <h1>Media UniGe 🎓</h1>
    <button id="clear-btn" onclick="clearAll()">Svuota tutto</button>
  </div>

  <div id="result-strip">
    <div class="stat-block">
      <span class="stat-label">Media pesata</span>
      <span class="stat-value v-muted" id="avg-val">—</span>
      <span class="stat-sub" id="lode-sub">con lode</span>
    </div>
    <div class="stat-block">
      <span class="stat-label">CFU totali</span>
      <span class="stat-value v-muted" id="cfu-val">0</span>
      <span class="stat-sub"> </span>
    </div>
    <div class="stat-block">
      <span class="stat-label">In 110esimi</span>
      <span class="stat-value v-muted" id="conv110-val">—</span>
      <span class="stat-sub"> </span>
    </div>
  </div>

  <div id="list"></div>

  <div id="bottom-bar">
    <div id="conv-row">
      <span>Esami validi</span>
      <span id="conv-val">0</span>
    </div>
    <button id="add-btn" onclick="addExam()">＋ Aggiungi esame</button>
  </div>

</div>

<div id="offline-toast">📡 Modalità offline</div>

<script>
  const LODE_VAL = 31;
  let exams = [];

  /* ── Storage ── */
  function save() {
    try { localStorage.setItem('mediaUnige_v2', JSON.stringify(exams)); } catch(e) {}
  }

  function load() {
    try {
      const d = localStorage.getItem('mediaUnige_v2');
      if (d) exams = JSON.parse(d);
    } catch(e) { exams = []; }
  }

  /* ── Helpers ── */
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }

  function escHtml(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function calcPunti(ex) {
    const v = parseFloat(ex.voto), c = parseFloat(ex.cfu);
    if (!isNaN(v) && !isNaN(c) && v >= 18 && v <= 30 && c > 0)
      return { v, c, eff: ex.lode ? LODE_VAL : v, ok: true };
    return { ok: false };
  }

  /* ── Actions ── */
  function addExam() {
    exams.push({ id: uid(), materia: '', voto: '', cfu: '', lode: false });
    save();
    render();
    setTimeout(() => {
      const all = document.querySelectorAll('.mat-input');
      if (all.length) all[all.length - 1].focus();
    }, 60);
  }

  function deleteExam(id) {
    exams = exams.filter(e => e.id !== id);
    save();
    render();
  }

  function clearAll() {
    if (!exams.length) return;
    if (!confirm('Eliminare tutti gli esami?')) return;
    exams = [];
    save();
    render();
  }

  function updateField(id, field, value) {
    const ex = exams.find(e => e.id === id);
    if (!ex) return;
    ex[field] = value;
    save();
    refreshPunti(id);
    computeStats();
  }

  function toggleLode(id) {
    const ex = exams.find(e => e.id === id);
    if (!ex) return;
    ex.lode = !ex.lode;
    save();
    const btn = document.querySelector(`.lode-toggle[data-id="${id}"]`);
    if (btn) btn.classList.toggle('active', ex.lode);
    refreshPunti(id);
    computeStats();
  }

  function refreshPunti(id) {
    const ex = exams.find(e => e.id === id);
    if (!ex) return;
    const pill = document.querySelector(`.punti-pill[data-id="${id}"]`);
    if (!pill) return;
    const p = calcPunti(ex);
    pill.textContent = p.ok ? (p.eff * p.c).toFixed(0) + ' pt' : '—';
  }

  /* ── Stats ── */
  function computeStats() {
    let totalP = 0, totalC = 0, count = 0, allLode = true;

    exams.forEach(ex => {
      const p = calcPunti(ex);
      if (p.ok) {
        totalP += p.eff * p.c;
        totalC += p.c;
        count++;
        if (!ex.lode) allLode = false;
      }
    });

    const setVal = (id, text, cls) => {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'stat-value ' + cls;
    };

    document.getElementById('conv-val').textContent = count;
    setVal('cfu-val', totalC || '0', totalC > 0 ? 'v-mid' : 'v-muted');

    if (!count || !totalC) {
      setVal('avg-val', '—', 'v-muted');
      setVal('conv110-val', '—', 'v-muted');
      document.getElementById('lode-sub').classList.remove('visible');
      return;
    }

    const avg = totalP / totalC;
    const cls = avg >= 30 ? 'v-lode' : avg >= 27 ? 'v-good' : avg >= 24 ? 'v-mid' : 'v-low';
    setVal('avg-val', avg.toFixed(2), cls);

    const hasLode = avg >= 30 && allLode;
    document.getElementById('lode-sub').classList.toggle('visible', hasLode);

    const c110 = (avg * 110 / 30).toFixed(2);
    setVal('conv110-val', c110, cls);
  }

  /* ── Render ── */
  function render() {
    const list = document.getElementById('list');
    list.innerHTML = '';

    if (!exams.length) {
      list.innerHTML = `
        <div id="empty-state">
          <div class="emoji">📚</div>
          <div>Nessun esame ancora.</div>
          <div style="font-size:0.78rem;margin-top:4px">Premi il bottone qui sotto per aggiungerne uno.</div>
        </div>`;
      computeStats();
      return;
    }

    exams.forEach(ex => {
      const p = calcPunti(ex);
      const puntiStr = p.ok ? (p.eff * p.c).toFixed(0) + ' pt' : '—';

      const card = document.createElement('div');
      card.className = 'exam-card';
      card.innerHTML = `
        <div class="card-top">
          <input class="mat-input" type="text" placeholder="Nome materia"
            value="${escHtml(ex.materia)}"
            oninput="updateField('${ex.id}','materia',this.value)"
            autocomplete="off" autocorrect="off" spellcheck="false">
          <button class="del-btn" onclick="deleteExam('${ex.id}')" aria-label="Elimina">✕</button>
        </div>
        <div class="card-bottom">
          <div class="field-group">
            <label>Voto</label>
            <input type="number" inputmode="numeric" min="18" max="30" placeholder="30"
              value="${escHtml(ex.voto)}"
              oninput="updateField('${ex.id}','voto',this.value)">
          </div>
          <div class="field-group">
            <label>CFU</label>
            <input type="number" inputmode="numeric" min="1" max="30" placeholder="6"
              value="${escHtml(ex.cfu)}"
              oninput="updateField('${ex.id}','cfu',this.value)">
          </div>
          <div class="lode-group">
            <span class="fl">Lode</span>
            <div class="lode-toggle ${ex.lode ? 'active' : ''}" data-id="${ex.id}"
              onclick="toggleLode('${ex.id}')">L</div>
          </div>
          <div class="punti-pill" data-id="${ex.id}">${puntiStr}</div>
        </div>
      `;
      list.appendChild(card);
    });

    computeStats();
  }

  /* ── Offline toast ── */
  function showOfflineToast() {
    const t = document.getElementById('offline-toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  window.addEventListener('offline', showOfflineToast);

  /* ── Service Worker ── */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }

  /* ── Init ── */
  load();
  render();
</script>
</body>
</html>
